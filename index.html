<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue Unit</title>
    <link rel="icon" href="unit.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>
    <header>
        <nav>
            <ul class="menu">
                <li><a href="index.html" class="active">Accueil</a></li>
                <li><a href="appartements.html">Appartements</a></li>
                <li><a href="motos.html">Motos</a></li>
                <li><a href="vehicules.html">Véhicules</a></li>
            </ul>
        </nav>
        <button id="adminBtn" class="admin-btn">Admin</button>
    </header>
    <main>
        <section id="appartements">
            <h2>Appartements</h2>
            <div class="categories">
                <button class="category-btn active" data-category="all">Tous</button>
                <span class="separator">|</span>
                <button class="category-btn" data-category="vente">Vente</button>
                <span class="separator">|</span>
                <button class="category-btn" data-category="location">Location</button>
            </div>
            <div class="types">
                <button class="type-btn active" data-type="all">Tous types</button>
                <span class="separator">|</span>
                <button class="type-btn" data-type="appartements">Appartements</button>
                <span class="separator">|</span>
                <button class="type-btn" data-type="maisons">Maisons</button>
                <span class="separator">|</span>
                <button class="type-btn" data-type="villa">Villa</button>
            </div>
            <div class="products" id="products-appartements"></div>
        </section>
        <section id="motos">
            <h2>Motos</h2>
            <div class="categories">
                <button class="category-btn active" data-category="all">Tous</button>
                <span class="separator">|</span>
                <button class="category-btn" data-category="vente">Vente</button>
                <span class="separator">|</span>
                <button class="category-btn" data-category="location">Location</button>
            </div>
            <div class="types">
                <button class="type-btn active" data-type="all">Tous types</button>
                <span class="separator">|</span>
                <button class="type-btn" data-type="sportive">Sportive</button>
                <span class="separator">|</span>
                <button class="type-btn" data-type="routière">Routière</button>
                <span class="separator">|</span>
                <button class="type-btn" data-type="trail">Trail</button>
                <span class="separator">|</span>
                <button class="type-btn" data-type="cruiser">Cruiser</button>
            </div>
            <div class="products" id="products-motos"></div>
        </section>
        <section id="vehicules">
            <h2>Véhicules</h2>
            <div class="categories">
                <button class="category-btn active" data-category="all">Tous</button>
                <span class="separator">|</span>
                <button class="category-btn" data-category="vente">Vente</button>
                <span class="separator">|</span>
                <button class="category-btn" data-category="location">Location</button>
            </div>
            <div class="types">
                <button class="type-btn active" data-type="all">Tous types</button>
                <span class="separator">|</span>
                <button class="type-btn" data-type="compact">Compact</button>
                <span class="separator">|</span>
                <button class="type-btn" data-type="SUV">SUV</button>
                <span class="separator">|</span>
                <button class="type-btn" data-type="tout terrain">Tout Terrain</button>
                <span class="separator">|</span>
                <button class="type-btn" data-type="sport">Sport</button>
                <span class="separator">|</span>
                <button class="type-btn" data-type="supercar">Supercar</button>
                <span class="separator">|</span>
                <button class="type-btn" data-type="camions">Camions</button>
            </div>
            <div class="products" id="products-vehicules"></div>
        </section>
    </main>
    <footer>
        <img src="FNH.png" alt="FNH Logo" class="fnh-logo">
    </footer>
    <script src="script.js"></script>
</body>
</html>
